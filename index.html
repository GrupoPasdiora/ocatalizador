<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalisador Literário · Grupo Pasdiora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A0A0F; color: #fff; font-family: 'Source Serif 4', serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    input:focus, button:focus { outline: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script crossorigin src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js"></script>

  <script type="text/babel">
    const { useState, useCallback, useRef, useEffect } = React;

    // ─── PROMPTS ────────────────────────────────────────────────────
    const SYSTEM_PROMPT = "Você é um editor literário sênior brasileiro com 30 anos de experiência em não-ficção, autoajuda e biografias. Você é exigente, preciso e construtivo. Responda SEMPRE em JSON válido, sem markdown, sem backticks. Apenas o JSON puro.";

    const MODULE_PROMPTS = {
      redundancias: {
        name: "Radar de Redundâncias",
        icon: "🔍",
        color: "#E63946",
        prompt: `Analise o texto abaixo e identifique TODAS as redundâncias:
1. Repetições lexicais: palavras ou expressões repetidas excessivamente
2. Redundâncias semânticas: parágrafos ou frases que dizem a mesma coisa de formas diferentes
3. Ideias circulares: argumentos que voltam ao mesmo ponto sem avançar
4. Chavões e clichês: expressões desgastadas que enfraquecem o texto

Responda em JSON:
{
  "score": "0-100 (100 = sem redundâncias)",
  "resumo": "análise geral em 2 frases",
  "problemas": [
    {
      "tipo": "lexical|semantica|circular|cliche",
      "gravidade": "alta|media|baixa",
      "trecho": "trecho problemático exato",
      "explicacao": "por que é redundante",
      "sugestao": "como resolver"
    }
  ],
  "estatisticas": {
    "palavras_mais_repetidas": [{"palavra": "x", "contagem": 0}],
    "densidade_redundancia": "X%"
  }
}

TEXTO:
`
      },
      arco_narrativo: {
        name: "Arquiteto de Arco",
        icon: "📐",
        color: "#457B9D",
        prompt: `Analise a estrutura narrativa do texto abaixo (não-ficção/autoajuda/biografia):
1. Estrutura: O texto tem começo-meio-fim claros? A progressão é lógica?
2. Ritmo: Onde o ritmo cai? Onde o leitor perderia interesse?
3. Ganchos: Existem elementos que mantêm o leitor engajado?
4. Transições: As passagens entre ideias/seções são suaves?
5. Tensão narrativa: Mesmo em não-ficção, existe tensão (problema→solução, antes→depois)?

Responda em JSON:
{
  "score": "0-100 (100 = arco perfeito)",
  "resumo": "análise geral em 2 frases",
  "estrutura": {
    "abertura": {"qualidade": "forte|media|fraca", "comentario": "..."},
    "desenvolvimento": {"qualidade": "forte|media|fraca", "comentario": "..."},
    "fechamento": {"qualidade": "forte|media|fraca", "comentario": "..."}
  },
  "pontos_fracos": [
    {
      "localizacao": "início|meio|fim do trecho",
      "problema": "descrição do problema",
      "impacto": "alto|medio|baixo",
      "sugestao": "como melhorar"
    }
  ],
  "ritmo_visual": "descrição do ritmo: onde acelera, onde freia"
}

TEXTO:
`
      },
      ortografia: {
        name: "Corretor Avançado",
        icon: "✏️",
        color: "#2A9D8F",
        prompt: `Analise o texto abaixo como um revisor profissional de português brasileiro:
1. Ortografia: erros de grafia
2. Gramática: concordância verbal/nominal, regência, crase, pontuação
3. Estilo gramatical: gerundismo, voz passiva excessiva, frases muito longas, anacolutos
4. Pontuação: vírgulas, pontos, travessões, uso correto de aspas

Responda em JSON:
{
  "score": "0-100 (100 = texto impecável)",
  "resumo": "análise geral em 2 frases",
  "erros": [
    {
      "tipo": "ortografia|gramatica|estilo|pontuacao",
      "gravidade": "alta|media|baixa",
      "trecho_original": "texto com erro",
      "correcao": "texto corrigido",
      "regra": "qual regra gramatical se aplica"
    }
  ],
  "estatisticas": {
    "total_erros": 0,
    "frases_muito_longas": 0,
    "voz_passiva_percentual": "X%"
  }
}

TEXTO:
`
      },
      enriquecimento: {
        name: "Enriquecedor de Escrita",
        icon: "💎",
        color: "#E9C46A",
        prompt: `Analise o texto abaixo e sugira enriquecimentos que elevem a qualidade literária:
1. Vocabulário: substituições por palavras mais precisas/evocativas
2. Figuras de linguagem: onde cabem metáforas, analogias, antíteses
3. Ritmo frasal: alternar frases curtas e longas para criar musicalidade
4. Show don't tell: onde o autor está "contando" em vez de "mostrando"
5. Sensorialidade: onde adicionar detalhes sensoriais (visão, som, tato, cheiro)

Responda em JSON:
{
  "score": "0-100 (100 = escrita magistral)",
  "resumo": "análise geral em 2 frases",
  "sugestoes": [
    {
      "tipo": "vocabulario|figura_linguagem|ritmo|show_dont_tell|sensorial",
      "impacto": "alto|medio|baixo",
      "trecho_original": "texto original",
      "sugestao_reescrita": "versão enriquecida",
      "explicacao": "por que esta versão é melhor"
    }
  ],
  "nivel_atual": "iniciante|intermediario|avancado|profissional",
  "potencial": "descrição do potencial do texto"
}

TEXTO:
`
      },
      catalisador: {
        name: "Fator Catalisador",
        icon: "⚡",
        color: "#F4A261",
        prompt: `Você é agora o "Catalisador" — avalie o PODER DE CATIVAÇÃO deste texto:
1. Abertura magnética: As primeiras linhas prendem? O leitor continuaria?
2. Voz autoral: A voz é distinta, memorável, autêntica? Ou genérica?
3. Conexão emocional: O texto gera empatia, curiosidade, identificação?
4. Page-turner factor: O leitor quer virar a página? Existe urgência?
5. Unicidade: Este texto se diferencia de outros do mesmo gênero?
6. Transformação: O leitor sai diferente de como entrou? (crucial para autoajuda)

Responda em JSON:
{
  "score": "0-100 (100 = impossível parar de ler)",
  "resumo": "análise geral em 2 frases",
  "veredito": "publicável como está | precisa de ajustes | precisa de reescrita significativa",
  "dimensoes": {
    "abertura_magnetica": {"score": "0-100", "comentario": "..."},
    "voz_autoral": {"score": "0-100", "comentario": "..."},
    "conexao_emocional": {"score": "0-100", "comentario": "..."},
    "page_turner": {"score": "0-100", "comentario": "..."},
    "unicidade": {"score": "0-100", "comentario": "..."},
    "transformacao": {"score": "0-100", "comentario": "..."}
  },
  "o_que_falta": "a coisa mais importante que falta neste texto",
  "ponto_forte": "o maior trunfo deste texto",
  "recomendacao_final": "conselho editorial em 3 frases"
}

TEXTO:
`
      }
    };

    // ─── API CALL ───────────────────────────────────────────────────
    async function callLLM(apiKey, moduleKey, text) {
      const mod = MODULE_PROMPTS[moduleKey];
      const truncated = text.slice(0, 12000);
      const response = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + apiKey,
        },
        body: JSON.stringify({
          model: "gpt-4o",
          max_tokens: 4000,
          temperature: 0.3,
          response_format: { type: "json_object" },
          messages: [
            { role: "system", content: SYSTEM_PROMPT },
            { role: "user", content: mod.prompt + truncated }
          ],
        }),
      });
      if (!response.ok) {
        const errBody = await response.text();
        let msg = "OpenAI API Error " + response.status;
        try { const p = JSON.parse(errBody); msg = p.error?.message || msg; } catch {}
        throw new Error(msg);
      }
      const data = await response.json();
      const raw = data.choices?.[0]?.message?.content || "";
      const cleaned = raw.replace(/```json|```/g, "").trim();
      return JSON.parse(cleaned);
    }

    // ─── READ DOCX ─────────────────────────────────────────────────
    async function readDocx(file) {
      const arrayBuffer = await file.arrayBuffer();
      const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
      return result.value;
    }

    // ─── SCORE RING ─────────────────────────────────────────────────
    function ScoreRing({ score, color, size = 120, strokeWidth = 8 }) {
      const radius = (size - strokeWidth) / 2;
      const circumference = 2 * Math.PI * radius;
      const offset = circumference - (score / 100) * circumference;
      const [animated, setAnimated] = useState(circumference);
      useEffect(() => {
        const t = setTimeout(() => setAnimated(offset), 100);
        return () => clearTimeout(t);
      }, [offset]);
      const getGrade = (s) => {
        if (s >= 90) return "A+";
        if (s >= 80) return "A";
        if (s >= 70) return "B";
        if (s >= 60) return "C";
        if (s >= 50) return "D";
        return "F";
      };
      return (
        <div style={{ position: "relative", width: size, height: size }}>
          <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
            <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={strokeWidth} />
            <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={animated} style={{ transition: "stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1)" }} />
          </svg>
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
            <span style={{ fontFamily: "'Playfair Display', serif", fontSize: size * 0.3, fontWeight: 900, color: color, lineHeight: 1 }}>{score}</span>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: size * 0.12, color: "rgba(255,255,255,0.5)", letterSpacing: 2, marginTop: 2 }}>{getGrade(score)}</span>
          </div>
        </div>
      );
    }

    // ─── BADGE ──────────────────────────────────────────────────────
    function Badge({ type, children }) {
      const colors = {
        alta: { bg: "rgba(230,57,70,0.15)", fg: "#E63946", border: "rgba(230,57,70,0.3)" },
        media: { bg: "rgba(244,162,97,0.15)", fg: "#F4A261", border: "rgba(244,162,97,0.3)" },
        baixa: { bg: "rgba(42,157,143,0.15)", fg: "#2A9D8F", border: "rgba(42,157,143,0.3)" },
        alto: { bg: "rgba(230,57,70,0.15)", fg: "#E63946", border: "rgba(230,57,70,0.3)" },
        medio: { bg: "rgba(244,162,97,0.15)", fg: "#F4A261", border: "rgba(244,162,97,0.3)" },
        baixo: { bg: "rgba(42,157,143,0.15)", fg: "#2A9D8F", border: "rgba(42,157,143,0.3)" },
        forte: { bg: "rgba(42,157,143,0.15)", fg: "#2A9D8F", border: "rgba(42,157,143,0.3)" },
        fraca: { bg: "rgba(230,57,70,0.15)", fg: "#E63946", border: "rgba(230,57,70,0.3)" },
      };
      const c = colors[type] || colors.media;
      return (
        <span style={{ display: "inline-block", padding: "2px 10px", borderRadius: 20, fontSize: 11, fontFamily: "'JetBrains Mono', monospace", fontWeight: 500, background: c.bg, color: c.fg, border: "1px solid " + c.border, textTransform: "uppercase", letterSpacing: 1 }}>{children}</span>
      );
    }

    // ─── PROBLEM CARD ───────────────────────────────────────────────
    function ProblemCard({ item, accentColor }) {
      const [expanded, setExpanded] = useState(false);
      const trecho = item.trecho || item.trecho_original || "";
      const explicacao = item.explicacao || item.problema || "";
      const sugestao = item.sugestao || item.sugestao_reescrita || item.correcao || "";
      return (
        <div onClick={() => setExpanded(!expanded)} style={{
          background: expanded ? "rgba(255,255,255,0.05)" : "rgba(255,255,255,0.03)",
          border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12,
          padding: "16px 20px", cursor: "pointer", transition: "all 0.2s",
          borderLeft: "3px solid " + accentColor
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
            <Badge type={item.gravidade || item.impacto}>{item.gravidade || item.impacto}</Badge>
            {item.tipo && <span style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1, textTransform: "uppercase" }}>{item.tipo}</span>}
            <span style={{ marginLeft: "auto", fontSize: 12, color: "rgba(255,255,255,0.3)" }}>{expanded ? "▲" : "▼"}</span>
          </div>
          {trecho && (
            <div style={{ fontFamily: "'Source Serif 4', serif", fontSize: 14, color: "rgba(255,255,255,0.7)", fontStyle: "italic", lineHeight: 1.6, marginBottom: expanded ? 12 : 0, maxHeight: expanded ? 500 : 40, overflow: "hidden", transition: "max-height 0.3s ease" }}>
              "{trecho}"
            </div>
          )}
          {expanded && (
            <div style={{ animation: "fadeIn 0.3s ease" }}>
              {explicacao && (
                <div style={{ marginTop: 10, padding: "10px 14px", borderRadius: 8, background: "rgba(255,255,255,0.04)", fontSize: 13, fontFamily: "'Source Serif 4', serif", color: "rgba(255,255,255,0.6)", lineHeight: 1.6 }}>
                  <strong style={{ color: "rgba(255,255,255,0.8)" }}>Problema: </strong>{explicacao}
                </div>
              )}
              {sugestao && (
                <div style={{ marginTop: 8, padding: "10px 14px", borderRadius: 8, background: accentColor + "11", fontSize: 13, fontFamily: "'Source Serif 4', serif", color: accentColor, lineHeight: 1.6, border: "1px solid " + accentColor + "22" }}>
                  <strong>✦ Sugestão: </strong>{sugestao}
                </div>
              )}
              {item.regra && (
                <div style={{ marginTop: 6, fontSize: 11, color: "rgba(255,255,255,0.35)", fontFamily: "'JetBrains Mono', monospace" }}>Regra: {item.regra}</div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ─── MODULE RESULT ──────────────────────────────────────────────
    function ModuleResult({ moduleKey, data }) {
      const mod = MODULE_PROMPTS[moduleKey];
      if (!data) return null;
      const items = data.problemas || data.pontos_fracos || data.erros || data.sugestoes || [];
      return (
        <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 16, padding: 28, marginBottom: 24 }}>
          <div style={{ display: "flex", alignItems: "flex-start", gap: 24, marginBottom: 24 }}>
            <ScoreRing score={data.score || 0} color={mod.color} />
            <div style={{ flex: 1 }}>
              <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 22, fontWeight: 700, color: "#fff", margin: "0 0 6px 0" }}>
                {mod.icon} {mod.name}
              </h3>
              <p style={{ fontFamily: "'Source Serif 4', serif", fontSize: 15, color: "rgba(255,255,255,0.6)", lineHeight: 1.6, margin: 0 }}>
                {data.resumo}
              </p>
              {data.veredito && (
                <div style={{ marginTop: 10, display: "inline-block", padding: "6px 16px", borderRadius: 20, fontSize: 12, fontWeight: 600, fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1, textTransform: "uppercase",
                  background: data.veredito.includes("como está") ? "rgba(42,157,143,0.15)" : data.veredito.includes("ajustes") ? "rgba(244,162,97,0.15)" : "rgba(230,57,70,0.15)",
                  color: data.veredito.includes("como está") ? "#2A9D8F" : data.veredito.includes("ajustes") ? "#F4A261" : "#E63946"
                }}>{data.veredito}</div>
              )}
            </div>
          </div>

          {/* Catalisador dimensions */}
          {data.dimensoes && (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 12, marginBottom: 20 }}>
              {Object.entries(data.dimensoes).map(([key, val]) => (
                <div key={key} style={{ background: "rgba(255,255,255,0.03)", borderRadius: 10, padding: "12px 16px", border: "1px solid rgba(255,255,255,0.05)" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                    <span style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1, textTransform: "uppercase" }}>{key.replace(/_/g, " ")}</span>
                    <span style={{ fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: 18, color: mod.color }}>{val.score}</span>
                  </div>
                  <div style={{ height: 3, borderRadius: 2, background: "rgba(255,255,255,0.06)", overflow: "hidden" }}>
                    <div style={{ height: "100%", borderRadius: 2, background: mod.color, width: val.score + "%", transition: "width 1s ease" }} />
                  </div>
                  <p style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", margin: "8px 0 0", fontFamily: "'Source Serif 4', serif", lineHeight: 1.5 }}>{val.comentario}</p>
                </div>
              ))}
            </div>
          )}

          {/* Catalisador what's missing / strong point */}
          {data.o_que_falta && (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
              <div style={{ background: "rgba(230,57,70,0.06)", borderRadius: 10, padding: 16, border: "1px solid rgba(230,57,70,0.1)" }}>
                <div style={{ fontSize: 11, color: "#E63946", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1, marginBottom: 6, textTransform: "uppercase" }}>O que falta</div>
                <p style={{ fontSize: 14, color: "rgba(255,255,255,0.7)", margin: 0, fontFamily: "'Source Serif 4', serif", lineHeight: 1.6 }}>{data.o_que_falta}</p>
              </div>
              <div style={{ background: "rgba(42,157,143,0.06)", borderRadius: 10, padding: 16, border: "1px solid rgba(42,157,143,0.1)" }}>
                <div style={{ fontSize: 11, color: "#2A9D8F", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1, marginBottom: 6, textTransform: "uppercase" }}>Ponto forte</div>
                <p style={{ fontSize: 14, color: "rgba(255,255,255,0.7)", margin: 0, fontFamily: "'Source Serif 4', serif", lineHeight: 1.6 }}>{data.ponto_forte}</p>
              </div>
            </div>
          )}

          {/* Arco narrativo structure */}
          {data.estrutura && (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 20 }}>
              {Object.entries(data.estrutura).map(([key, val]) => {
                const qColors = { forte: "#2A9D8F", media: "#F4A261", fraca: "#E63946" };
                return (
                  <div key={key} style={{ background: "rgba(255,255,255,0.03)", borderRadius: 10, padding: "12px 16px", borderTop: "3px solid " + (qColors[val.qualidade] || mod.color) }}>
                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1, textTransform: "uppercase", marginBottom: 4 }}>{key}</div>
                    <Badge type={val.qualidade}>{val.qualidade}</Badge>
                    <p style={{ fontSize: 13, color: "rgba(255,255,255,0.6)", margin: "8px 0 0", fontFamily: "'Source Serif 4', serif", lineHeight: 1.5 }}>{val.comentario}</p>
                  </div>
                );
              })}
            </div>
          )}

          {/* Statistics */}
          {data.estatisticas && (
            <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 10, padding: "12px 16px", marginBottom: 16, display: "flex", gap: 24, flexWrap: "wrap" }}>
              {Object.entries(data.estatisticas).map(([key, val]) => (
                <div key={key}>
                  <span style={{ fontSize: 11, color: "rgba(255,255,255,0.35)", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1, textTransform: "uppercase" }}>{key.replace(/_/g, " ")}: </span>
                  <span style={{ fontSize: 13, color: "rgba(255,255,255,0.7)", fontFamily: "'JetBrains Mono', monospace" }}>{typeof val === "object" ? JSON.stringify(val) : String(val)}</span>
                </div>
              ))}
            </div>
          )}

          {/* Recommendation */}
          {data.recomendacao_final && (
            <div style={{ background: mod.color + "0D", borderRadius: 10, padding: 16, border: "1px solid " + mod.color + "22", marginBottom: 16 }}>
              <div style={{ fontSize: 11, color: mod.color, fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1, marginBottom: 6, textTransform: "uppercase" }}>Recomendação final</div>
              <p style={{ fontSize: 14, color: "rgba(255,255,255,0.8)", margin: 0, fontFamily: "'Source Serif 4', serif", lineHeight: 1.7 }}>{data.recomendacao_final}</p>
            </div>
          )}

          {/* Problem cards */}
          {items.length > 0 && (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1, textTransform: "uppercase", marginBottom: 4 }}>
                {items.length} {items.length === 1 ? "item encontrado" : "itens encontrados"} — clique para expandir
              </div>
              {items.map((item, i) => <ProblemCard key={i} item={item} accentColor={mod.color} />)}
            </div>
          )}
        </div>
      );
    }

    // ─── MAIN APP ───────────────────────────────────────────────────
    function App() {
      const [apiKey, setApiKey] = useState("");
      const [showKey, setShowKey] = useState(false);
      const [text, setText] = useState("");
      const [fileName, setFileName] = useState("");
      const [wordCount, setWordCount] = useState(0);
      const [results, setResults] = useState({});
      const [running, setRunning] = useState(null);
      const [error, setError] = useState("");
      const [activeTab, setActiveTab] = useState(null);
      const [allDone, setAllDone] = useState(false);
      const fileRef = useRef(null);
      const moduleKeys = Object.keys(MODULE_PROMPTS);

      const handleFile = useCallback(async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        setError(""); setResults({}); setAllDone(false); setActiveTab(null);
        try {
          setFileName(file.name);
          const content = await readDocx(file);
          setText(content);
          setWordCount(content.split(/\s+/).filter(Boolean).length);
        } catch (err) {
          setError("Erro ao ler o arquivo: " + err.message);
        }
      }, []);

      const runAll = useCallback(async () => {
        if (!apiKey) { setError("Insira sua API key da OpenAI"); return; }
        if (!text) { setError("Carregue um arquivo .docx primeiro"); return; }
        setError(""); setResults({}); setAllDone(false);
        for (const key of moduleKeys) {
          setRunning(key); setActiveTab(key);
          try {
            const result = await callLLM(apiKey, key, text);
            setResults(prev => ({ ...prev, [key]: result }));
          } catch (err) {
            setResults(prev => ({ ...prev, [key]: { score: 0, resumo: "Erro: " + err.message, _error: true } }));
          }
        }
        setRunning(null); setAllDone(true);
      }, [apiKey, text, moduleKeys]);

      const runSingle = useCallback(async (key) => {
        if (!apiKey) { setError("Insira sua API key da OpenAI"); return; }
        if (!text) { setError("Carregue um arquivo .docx primeiro"); return; }
        setError(""); setRunning(key); setActiveTab(key);
        try {
          const result = await callLLM(apiKey, key, text);
          setResults(prev => ({ ...prev, [key]: result }));
        } catch (err) {
          setResults(prev => ({ ...prev, [key]: { score: 0, resumo: "Erro: " + err.message, _error: true } }));
        }
        setRunning(null);
      }, [apiKey, text]);

      const overallScore = moduleKeys.filter(k => results[k]?.score).length > 0
        ? Math.round(moduleKeys.reduce((sum, k) => sum + (results[k]?.score || 0), 0) / moduleKeys.filter(k => results[k]?.score).length)
        : null;

      return (
        <div style={{ minHeight: "100vh", background: "#0A0A0F", color: "#fff", fontFamily: "'Source Serif 4', serif" }}>
          {/* BG texture */}
          <div style={{ position: "fixed", inset: 0, opacity: 0.03, pointerEvents: "none", backgroundImage: "radial-gradient(circle at 25% 25%, #E63946 0%, transparent 50%), radial-gradient(circle at 75% 75%, #457B9D 0%, transparent 50%)" }} />

          <div style={{ maxWidth: 960, margin: "0 auto", padding: "40px 24px", position: "relative" }}>

            {/* Header */}
            <header style={{ textAlign: "center", marginBottom: 48 }}>
              <div style={{ fontSize: 12, fontFamily: "'JetBrains Mono', monospace", letterSpacing: 6, textTransform: "uppercase", color: "rgba(255,255,255,0.25)", marginBottom: 16 }}>
                GRUPO PASDIORA · EDITORIAL AI
              </div>
              <h1 style={{ fontFamily: "'Playfair Display', serif", fontSize: 48, fontWeight: 900, margin: 0, lineHeight: 1.1, background: "linear-gradient(135deg, #E63946, #F4A261, #E9C46A)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
                Catalisador Literário
              </h1>
              <p style={{ fontSize: 16, color: "rgba(255,255,255,0.4)", marginTop: 12, fontStyle: "italic", letterSpacing: 0.5 }}>
                Transforme manuscritos em obras que o leitor não consegue largar
              </p>
            </header>

            {/* API Key */}
            <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 14, padding: "20px 24px", marginBottom: 20 }}>
              <label style={{ fontSize: 11, fontFamily: "'JetBrains Mono', monospace", letterSpacing: 2, textTransform: "uppercase", color: "rgba(255,255,255,0.35)", display: "block", marginBottom: 8 }}>
                🔑 OPENAI API KEY
              </label>
              <div style={{ display: "flex", gap: 8 }}>
                <input type={showKey ? "text" : "password"} value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="sk-proj-..."
                  style={{ flex: 1, background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8, padding: "10px 14px", color: "#fff", fontSize: 14, fontFamily: "'JetBrains Mono', monospace" }} />
                <button onClick={() => setShowKey(!showKey)} style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8, padding: "0 14px", color: "rgba(255,255,255,0.5)", cursor: "pointer", fontSize: 13 }}>
                  {showKey ? "Ocultar" : "Mostrar"}
                </button>
              </div>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,0.25)", marginTop: 6, fontFamily: "'JetBrains Mono', monospace" }}>
                Sua key fica apenas no seu browser. Nada é salvo em servidor.
              </div>
            </div>

            {/* File Upload */}
            <div style={{ background: "rgba(255,255,255,0.03)", border: "2px dashed rgba(255,255,255,0.08)", borderRadius: 14, padding: 32, textAlign: "center", marginBottom: 20, cursor: "pointer", transition: "all 0.3s" }}
              onClick={() => fileRef.current?.click()}
              onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderColor = "#F4A261"; }}
              onDragLeave={e => { e.currentTarget.style.borderColor = "rgba(255,255,255,0.08)"; }}
              onDrop={e => {
                e.preventDefault();
                e.currentTarget.style.borderColor = "rgba(255,255,255,0.08)";
                if (e.dataTransfer.files[0]) {
                  const dt = new DataTransfer();
                  dt.items.add(e.dataTransfer.files[0]);
                  fileRef.current.files = dt.files;
                  handleFile({ target: { files: e.dataTransfer.files } });
                }
              }}
            >
              <input ref={fileRef} type="file" accept=".docx" onChange={handleFile} style={{ display: "none" }} />
              {fileName ? (
                <div style={{ animation: "fadeIn 0.3s ease" }}>
                  <div style={{ fontSize: 40, marginBottom: 8 }}>📖</div>
                  <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 20, fontWeight: 700, color: "#F4A261", marginBottom: 4 }}>{fileName}</div>
                  <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: "rgba(255,255,255,0.4)" }}>
                    {wordCount.toLocaleString("pt-BR")} palavras · ~{Math.ceil(wordCount / 250)} páginas
                  </div>
                </div>
              ) : (
                <div>
                  <div style={{ fontSize: 40, marginBottom: 8, opacity: 0.5 }}>📄</div>
                  <div style={{ fontSize: 15, color: "rgba(255,255,255,0.4)" }}>
                    Arraste seu <strong style={{ color: "rgba(255,255,255,0.6)" }}>.docx</strong> aqui ou clique para selecionar
                  </div>
                </div>
              )}
            </div>

            {/* Error */}
            {error && (
              <div style={{ background: "rgba(230,57,70,0.1)", border: "1px solid rgba(230,57,70,0.2)", borderRadius: 10, padding: "12px 16px", marginBottom: 20, fontSize: 13, color: "#E63946", fontFamily: "'JetBrains Mono', monospace" }}>
                ⚠ {error}
              </div>
            )}

            {/* Module Buttons */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 10, marginBottom: 12 }}>
              {moduleKeys.map(key => {
                const mod = MODULE_PROMPTS[key];
                const done = !!results[key];
                const isRunning = running === key;
                return (
                  <button key={key} onClick={() => done ? setActiveTab(key) : runSingle(key)}
                    disabled={isRunning || (running && running !== key)}
                    style={{
                      background: isRunning ? "linear-gradient(90deg, " + mod.color + "22, " + mod.color + "44, " + mod.color + "22)" : done ? mod.color + "15" : "rgba(255,255,255,0.03)",
                      backgroundSize: isRunning ? "200% 100%" : undefined,
                      animation: isRunning ? "shimmer 1.5s infinite" : undefined,
                      border: "1px solid " + (done ? mod.color + "44" : "rgba(255,255,255,0.06)"),
                      borderRadius: 10, padding: "14px 12px", cursor: "pointer",
                      color: done ? mod.color : "rgba(255,255,255,0.5)",
                      textAlign: "center", transition: "all 0.3s",
                      opacity: (running && running !== key) ? 0.4 : 1
                    }}
                  >
                    <div style={{ fontSize: 22, marginBottom: 4 }}>{mod.icon}</div>
                    <div style={{ fontSize: 11, fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0.5, lineHeight: 1.3 }}>{mod.name}</div>
                    {done && results[key].score > 0 && (
                      <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 20, fontWeight: 900, color: mod.color, marginTop: 4 }}>{results[key].score}</div>
                    )}
                    {isRunning && (
                      <div style={{ fontSize: 10, marginTop: 4, animation: "pulse 1s infinite", color: mod.color }}>analisando...</div>
                    )}
                  </button>
                );
              })}
            </div>

            {/* Run All */}
            <button onClick={runAll} disabled={!!running || !text}
              style={{
                width: "100%", padding: "16px", marginBottom: 32, borderRadius: 12,
                border: "none", cursor: running ? "wait" : "pointer",
                background: running ? "linear-gradient(90deg, #E6394622, #F4A26144, #E6394622)" : "linear-gradient(135deg, #E63946, #F4A261)",
                backgroundSize: running ? "200% 100%" : undefined,
                animation: running ? "shimmer 1.5s infinite" : undefined,
                color: "#fff", fontSize: 15, fontFamily: "'Playfair Display', serif",
                fontWeight: 700, letterSpacing: 1, transition: "all 0.3s",
                opacity: (!text || !!running) ? 0.5 : 1
              }}
            >
              {running ? "⏳ Analisando: " + MODULE_PROMPTS[running]?.name + "..." : allDone ? "✦ Reanalisar tudo" : "⚡ ANALISAR TUDO — 5 módulos"}
            </button>

            {/* Overall Score */}
            {overallScore !== null && (
              <div style={{ textAlign: "center", marginBottom: 32, animation: "fadeIn 0.5s ease" }}>
                <div style={{ fontSize: 11, fontFamily: "'JetBrains Mono', monospace", letterSpacing: 3, textTransform: "uppercase", color: "rgba(255,255,255,0.3)", marginBottom: 12 }}>SCORE EDITORIAL GERAL</div>
                <ScoreRing score={overallScore} color="#F4A261" size={160} strokeWidth={10} />
              </div>
            )}

            {/* Tabs */}
            {Object.keys(results).length > 0 && (
              <div style={{ display: "flex", gap: 4, marginBottom: 24, flexWrap: "wrap", borderBottom: "1px solid rgba(255,255,255,0.06)", paddingBottom: 12 }}>
                {moduleKeys.filter(k => results[k]).map(key => {
                  const mod = MODULE_PROMPTS[key];
                  const active = activeTab === key;
                  return (
                    <button key={key} onClick={() => setActiveTab(key)} style={{
                      background: active ? mod.color + "15" : "transparent",
                      border: "1px solid " + (active ? mod.color + "44" : "transparent"),
                      borderRadius: 8, padding: "8px 16px", cursor: "pointer",
                      color: active ? mod.color : "rgba(255,255,255,0.4)",
                      fontSize: 12, fontFamily: "'JetBrains Mono', monospace",
                      letterSpacing: 0.5, transition: "all 0.2s"
                    }}>
                      {mod.icon} {mod.name}
                      {results[key].score > 0 && <span style={{ marginLeft: 6, fontWeight: 700 }}>{results[key].score}</span>}
                    </button>
                  );
                })}
              </div>
            )}

            {/* Active Result */}
            {activeTab && results[activeTab] && (
              <div style={{ animation: "fadeIn 0.3s ease" }}>
                <ModuleResult moduleKey={activeTab} data={results[activeTab]} />
              </div>
            )}

            {/* Footer */}
            <footer style={{ textAlign: "center", marginTop: 48, paddingTop: 24, borderTop: "1px solid rgba(255,255,255,0.04)" }}>
              <div style={{ fontSize: 11, fontFamily: "'JetBrains Mono', monospace", letterSpacing: 2, color: "rgba(255,255,255,0.15)" }}>
                CATALISADOR LITERÁRIO · GRUPO PASDIORA · {new Date().getFullYear()}
              </div>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,0.1)", marginTop: 4, fontFamily: "'JetBrains Mono', monospace" }}>
                Powered by GPT-4o · OpenAI API
              </div>
            </footer>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
